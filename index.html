<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <title>FitLog — AI 健身教練</title>
  <meta name="theme-color" content="#0D0D0F">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FitLog">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icons/icon-180.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main id="view"></main>

  <div id="miniBar" class="mini-bar hidden"></div>

  <nav class="tabbar">
    <button class="tab active" data-tab="dashboard"><span class="tab-icon">📊</span>總覽</button>
    <button class="tab" data-tab="calendar"><span class="tab-icon">🗓</span>日曆</button>
    <button class="tab" data-tab="workouts"><span class="tab-icon">🏋️</span>訓練</button>
    <button class="tab" data-tab="coach"><span class="tab-icon">✦</span>AI 教練</button>
    <button class="tab" data-tab="more"><span class="tab-icon">⋯</span>更多</button>
  </nav>

  <div id="overlay" class="overlay hidden"></div>
  <div id="workoutOverlay" class="overlay workout-overlay hidden"></div>
  <div id="modal" class="modal-backdrop hidden"></div>
  <div id="toast" class="toast"></div>

  <script src="js/data.js"></script>
  <script src="js/stats.js"></script>
  <script src="js/ai.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/coach.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
